<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍕 Pizza des Tontons</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0a06; --surface: #1a1108; --card: #221608;
    --border: rgba(230,180,80,0.15); --orange: #E67E22;
    --orange-light: #f39c4a; --orange-dim: rgba(230,126,34,0.12);
    --cream: #FFF8EE; --muted: rgba(255,248,238,0.45);
    --red: #e74c3c; --green: #27AE60; --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--cream); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 1.25rem 1rem; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; }
  .brand span { color: var(--orange); }
  .counter-badge { background: var(--orange-dim); border: 1px solid rgba(230,126,34,0.3); color: var(--orange-light); font-size: 0.65rem; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 999px; }

  .form-wrap { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--orange); display: flex; align-items: center; gap: 6px; }
  .field-label.required::after { content: '●'; color: var(--red); font-size: 0.45rem; }
  .field-label .optional { color: var(--muted); font-size: 0.55rem; letter-spacing: 0.05em; text-transform: none; }

  input[type=text], input[type=tel] { background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--cream); font-family: 'DM Mono', monospace; font-size: 0.9rem; padding: 0.75rem 1rem; width: 100%; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  input[type=text]:focus, input[type=tel]:focus { border-color: var(--orange); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .pizza-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pizza-btn { background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.85rem; padding: 0.85rem 1rem; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; transition: all 0.15s; user-select: none; }
  .pizza-btn.selected { background: var(--orange-dim); border-color: var(--orange); color: var(--cream); }
  .pizza-btn .check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid rgba(255,248,238,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; transition: all 0.15s; }
  .pizza-btn.selected .check { background: var(--orange); border-color: var(--orange); color: white; }

  .recap-pills { display: flex; flex-wrap: wrap; gap: 6px; min-height: 22px; }
  .recap-pill { background: var(--orange-dim); border: 1px solid rgba(230,126,34,0.3); color: var(--orange-light); font-size: 0.65rem; padding: 3px 10px; border-radius: 999px; }
  .recap-empty { font-size: 0.7rem; color: var(--muted); }

  .allergy-toggle { display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; }
  .allergy-toggle span { font-size: 0.8rem; color: var(--muted); }
  .toggle-switch { width: 40px; height: 22px; background: rgba(255,255,255,0.08); border-radius: 999px; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-switch.on { background: var(--red); }
  .toggle-knob { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: white; transition: transform 0.2s; }
  .toggle-switch.on .toggle-knob { transform: translateX(18px); }
  .allergy-field { display: none; margin-top: 8px; }
  .allergy-field.show { display: block; }
  .allergy-warn { font-size: 0.65rem; color: var(--red); margin-top: 4px; }

  .pay-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .pay-option { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem; cursor: pointer; text-align: center; font-size: 0.8rem; transition: all 0.2s; user-select: none; }
  .pay-option.selected { border-color: var(--orange); background: var(--orange-dim); color: var(--orange-light); }

  .submit-btn { background: var(--orange); color: white; border: none; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; padding: 1rem; width: 100%; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .submit-btn:hover { background: var(--orange-light); }
  .submit-btn:active { transform: scale(0.98); }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--green); color: white; font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 0.75rem 1.25rem; border-radius: 999px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; z-index: 100; pointer-events: none; }
  .toast.error { background: var(--red); }
  .toast.show { opacity: 1; }

  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: flex-end; justify-content: center; }
  .confirm-overlay.show { display: flex; }
  .confirm-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; padding: 1.5rem 1.25rem 2rem; width: 100%; max-width: 480px; }
  .confirm-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 1rem; }
  .confirm-num { color: var(--orange); }
  .confirm-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
  .confirm-row:last-of-type { border-bottom: none; }
  .confirm-key { color: var(--muted); }
  .confirm-val { color: var(--cream); text-align: right; max-width: 65%; }
  .confirm-allergy { color: var(--red); }
  .confirm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { background: none; border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 0.8rem; cursor: pointer; }
  .btn-confirm { background: var(--orange); border: none; border-radius: 10px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; padding: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-confirm:disabled { background: rgba(230,126,34,0.3); cursor: not-allowed; }

  .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HISTORIQUE */
  .divider { height: 1px; background: var(--border); margin: 0 1.25rem; }
  .history-section { padding: 0 1.25rem 2rem; }
  .history-title { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; padding-top: 0.75rem; }
  .history-item { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.72rem; }
  .history-item:last-child { border-bottom: none; }
  .h-left { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
  .h-num { color: var(--orange); font-weight: 500; flex-shrink: 0; }
  .h-name { color: var(--cream); }
  .h-allergy { color: var(--red); font-size: 0.6rem; }
  .h-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .h-time { color: var(--muted); font-size: 0.65rem; }
  .sms-btn { background: var(--orange-dim); border: 1px solid rgba(230,126,34,0.3); color: var(--orange-light); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 3px 8px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .sms-btn:hover { background: var(--orange); color: white; border-color: var(--orange); }
  .sms-btn.no-phone { opacity: 0.25; cursor: default; pointer-events: none; }

  .reset-btn { display: block; margin: 0.5rem 1.25rem 2rem; background: none; border: 1px dashed rgba(231,76,60,0.3); border-radius: 10px; color: rgba(231,76,60,0.5); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; padding: 0.6rem; cursor: pointer; width: calc(100% - 2.5rem); text-align: center; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">🍕 Pizza <span>des Tontons</span></div>
    <div class="counter-badge" id="counter">SERVICE — 0 cmd</div>
  </div>
</div>

<div class="form-wrap">

  <div class="row2">
    <div class="field-group">
      <label class="field-label required">Nom client</label>
      <input type="text" id="nom" placeholder="Sophie" autocomplete="off" autocorrect="off">
    </div>
    <div class="field-group">
      <label class="field-label required">Heure</label>
      <input type="text" id="heure" placeholder="13h12" autocomplete="off">
    </div>
  </div>

  <div class="field-group">
    <label class="field-label">Téléphone <span class="optional">(optionnel — pour SMS)</span></label>
    <input type="tel" id="telephone" placeholder="06 12 34 56 78" autocomplete="off">
  </div>

  <div class="field-group">
    <label class="field-label required">Pizzas</label>
    <div class="pizza-grid" id="pizza-grid"></div>
    <div class="recap-pills" id="recap-pills"><span class="recap-empty">Aucune pizza sélectionnée</span></div>
  </div>

  <div class="field-group">
    <label class="field-label">Allergie / SANS</label>
    <div class="allergy-toggle" onclick="toggleAllergy()">
      <span id="allergy-toggle-label">Aucune allergie</span>
      <div class="toggle-switch" id="allergy-switch"><div class="toggle-knob"></div></div>
    </div>
    <div class="allergy-field" id="allergy-field">
      <input type="text" id="allergie" placeholder="ex. SANS anchois, SANS gluten…" autocomplete="off" autocorrect="off">
      <div class="allergy-warn">⚠️ Pense à le dire à voix haute vers la cuisine !</div>
    </div>
  </div>

  <div class="field-group">
    <label class="field-label required">Paiement</label>
    <div class="pay-options">
      <div class="pay-option selected" id="pay-cb" onclick="selectPay('CB')">💳 CB</div>
      <div class="pay-option" id="pay-esp" onclick="selectPay('Espèces')">💶 Espèces</div>
    </div>
  </div>

  <button class="submit-btn" onclick="showConfirm()">Envoyer sur Trello →</button>
</div>

<div class="divider"></div>
<div class="history-section">
  <div class="history-title">Commandes du service</div>
  <div id="history-list"><div style="font-size:0.7rem;color:var(--muted);padding:0.5rem 0;">Aucune commande pour l'instant.</div></div>
</div>
<button class="reset-btn" onclick="resetService()">Réinitialiser le service</button>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-card">
    <div class="confirm-title">Commande <span class="confirm-num" id="c-num">#001</span></div>
    <div id="confirm-details"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Corriger</button>
      <button class="btn-confirm" id="btn-send" onclick="sendToTrello()">
        <span id="send-label">Envoyer</span>
        <div class="spinner" id="send-spinner"></div>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY  = 'cd1e6513188a9fd49831516bb1ac3027';
const TOKEN    = 'ATTAd5cfbdb0e3e8ad4485cd4f927ce34ee25561105d74a2c9f79aab8ecc564e6078C16D828F';
const BOARD_ID = 'h0s5eobj';
const MENU = ['Margherita', 'Salsiccia'];

let orderCount = 0;
let historyList = [];
let paiement = 'CB';
let allergyOn = false;
let targetListId = null;
let selected = new Set();

function buildGrid() {
  const grid = document.getElementById('pizza-grid');
  grid.innerHTML = '';
  MENU.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'pizza-btn' + (selected.has(i) ? ' selected' : '');
    btn.innerHTML = `<div class="check">${selected.has(i) ? '✓' : ''}</div>${name}`;
    btn.onclick = () => { selected.has(i) ? selected.delete(i) : selected.add(i); buildGrid(); };
    grid.appendChild(btn);
  });
  updateRecap();
}

function updateRecap() {
  const pills = document.getElementById('recap-pills');
  if (!selected.size) { pills.innerHTML = '<span class="recap-empty">Aucune pizza sélectionnée</span>'; return; }
  pills.innerHTML = [...selected].sort().map(i => `<span class="recap-pill">${MENU[i]}</span>`).join('');
}

function getNow() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}h${String(n.getMinutes()).padStart(2,'0')}`;
}
document.getElementById('heure').value = getNow();

function selectPay(val) {
  paiement = val;
  document.getElementById('pay-cb').classList.toggle('selected', val === 'CB');
  document.getElementById('pay-esp').classList.toggle('selected', val === 'Espèces');
}

function toggleAllergy() {
  allergyOn = !allergyOn;
  document.getElementById('allergy-switch').classList.toggle('on', allergyOn);
  document.getElementById('allergy-field').classList.toggle('show', allergyOn);
  document.getElementById('allergy-toggle-label').textContent = allergyOn ? '⚠️ Allergie notée' : 'Aucune allergie';
  if (allergyOn) document.getElementById('allergie').focus();
}

function getFormData() {
  return {
    nom: document.getElementById('nom').value.trim(),
    heure: document.getElementById('heure').value.trim(),
    telephone: document.getElementById('telephone').value.trim(),
    allergie: allergyOn ? document.getElementById('allergie').value.trim() : '',
    pizzas: [...selected].sort().map(i => MENU[i]),
    paiement
  };
}

function getNextNum() { return String(orderCount + 1).padStart(3, '0'); }

function buildTitre(d, num) {
  const pizzaEmoji = d.pizzas.map(() => '🍕').join('');
  const pizzaNames = d.pizzas.join('+');
  const allergyFlag = d.allergie ? ' ⚠️' : '';
  return `${pizzaEmoji} ${pizzaNames} · #${num} · ${d.nom} — ${d.heure}${allergyFlag}`;
}

function showConfirm() {
  const d = getFormData();
  if (!d.nom) { showToast('Indique le nom du client', true); return; }
  if (!d.pizzas.length) { showToast('Sélectionne au moins une pizza', true); return; }

  const num = getNextNum();
  document.getElementById('c-num').textContent = '#' + num;
  let html = `<div class="confirm-row"><span class="confirm-key">Client</span><span class="confirm-val">${d.nom}</span></div>`;
  html += `<div class="confirm-row"><span class="confirm-key">Heure</span><span class="confirm-val">${d.heure}</span></div>`;
  if (d.telephone) html += `<div class="confirm-row"><span class="confirm-key">Téléphone</span><span class="confirm-val">${d.telephone}</span></div>`;
  html += `<div class="confirm-row"><span class="confirm-key">Pizza(s)</span><span class="confirm-val">${d.pizzas.join('<br>')}</span></div>`;
  html += `<div class="confirm-row"><span class="confirm-key">Paiement</span><span class="confirm-val">${d.paiement}</span></div>`;
  if (d.allergie) html += `<div class="confirm-row"><span class="confirm-key">Allergie</span><span class="confirm-val confirm-allergy">⚠️ ${d.allergie}</span></div>`;
  html += `<div class="confirm-row"><span class="confirm-key">Titre Trello</span><span class="confirm-val" style="font-size:0.68rem;color:var(--orange-light)">${buildTitre(d, num)}</span></div>`;
  document.getElementById('confirm-details').innerHTML = html;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('show'); }

async function findList() {
  try {
    const r = await fetch(`https://api.trello.com/1/boards/${BOARD_ID}/lists?key=${API_KEY}&token=${TOKEN}`);
    const lists = await r.json();
    const t = lists.find(l => l.name.toLowerCase().includes('commande') || l.name.toLowerCase().includes('prendre') || l.name.toLowerCase().includes('entrante'));
    targetListId = t ? t.id : (lists[0] ? lists[0].id : null);
  } catch(e) {}
}
findList();

async function sendToTrello() {
  const d = getFormData();
  const num = getNextNum();
  const btn = document.getElementById('btn-send');
  const lbl = document.getElementById('send-label');
  const spn = document.getElementById('send-spinner');
  btn.disabled = true; lbl.style.display = 'none'; spn.classList.add('show');

  const titre = buildTitre(d, num);
  let desc = `🍕 *Pizzas :*\n${d.pizzas.map((p,i) => `${i+1}. ${p}`).join('\n')}\n\n💳 *Paiement :* ${d.paiement}`;
  if (d.telephone) desc += `\n📱 *Téléphone :* ${d.telephone}`;
  if (d.allergie) desc += `\n\n⚠️ *ALLERGIE / SANS :* ${d.allergie}`;
  desc += `\n\n_Commande prise à ${d.heure}_`;

  let labelIds = [];
  try {
    const lr = await fetch(`https://api.trello.com/1/boards/${BOARD_ID}/labels?key=${API_KEY}&token=${TOKEN}`);
    const labels = await lr.json();
    const payL = labels.find(l => l.name && l.name.toLowerCase().includes(d.paiement === 'CB' ? 'cb' : 'esp'));
    const algL = labels.find(l => l.name && l.name.toLowerCase().includes('allerg'));
    if (payL) labelIds.push(payL.id);
    if (d.allergie && algL) labelIds.push(algL.id);
  } catch(e) {}

  try {
    if (!targetListId) await findList();
    const body = { name: titre, desc, idList: targetListId, key: API_KEY, token: TOKEN };
    if (labelIds.length) body.idLabels = labelIds.join(',');
    const res = await fetch('https://api.trello.com/1/cards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error();
    orderCount++;
    const numStr = String(orderCount).padStart(3,'0');
    historyList.unshift({ num: numStr, nom: d.nom, heure: d.heure, allergie: d.allergie, telephone: d.telephone, pizzas: d.pizzas });
    updateCounter(); updateHistory(); resetForm(); closeConfirm();
    showToast(`✓ #${numStr} · ${d.nom} envoyé !`);
  } catch(e) {
    showToast('Erreur réseau — vérifie ta connexion', true);
  }
  btn.disabled = false; lbl.style.display = ''; spn.classList.remove('show');
}

function sendSms(h) {
  if (!h.telephone) return;
  const tel = h.telephone.replace(/\s/g, '');
  const msg = encodeURIComponent(`Bonjour ${h.nom} ! Votre pizza ${h.pizzas.join(' + ')} est prête 🍕 — Pizza des Tontons`);
  window.location.href = `sms:${tel}?body=${msg}`;
}

function updateCounter() { document.getElementById('counter').textContent = `SERVICE — ${orderCount} cmd`; }

function updateHistory() {
  const el = document.getElementById('history-list');
  if (!historyList.length) { el.innerHTML = '<div style="font-size:0.7rem;color:var(--muted);padding:0.5rem 0;">Aucune commande pour l\'instant.</div>'; return; }
  el.innerHTML = historyList.map((h, i) => `
    <div class="history-item">
      <div class="h-left">
        <span class="h-num">#${h.num}</span>
        <span class="h-name">${h.nom}</span>
        ${h.allergie ? '<span class="h-allergy">⚠️</span>' : ''}
      </div>
      <div class="h-right">
        <span class="h-time">${h.heure}</span>
        <button class="sms-btn ${h.telephone ? '' : 'no-phone'}" onclick="sendSms(historyList[${i}])">
          📱 SMS
        </button>
      </div>
    </div>`).join('');
}

function resetForm() {
  document.getElementById('nom').value = '';
  document.getElementById('heure').value = getNow();
  document.getElementById('telephone').value = '';
  allergyOn = false;
  document.getElementById('allergy-switch').classList.remove('on');
  document.getElementById('allergy-field').classList.remove('show');
  document.getElementById('allergy-toggle-label').textContent = 'Aucune allergie';
  document.getElementById('allergie').value = '';
  selectPay('CB');
  selected = new Set();
  buildGrid();
  setTimeout(() => document.getElementById('nom').focus(), 100);
}

function resetService() {
  if (!confirm('Réinitialiser le compteur du service ?')) return;
  orderCount = 0; historyList = [];
  updateCounter(); updateHistory(); resetForm();
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error ? ' error' : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

buildGrid();
</script>
</body>
</html>
